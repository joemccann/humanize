<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Humanize</title>
  <meta name="description" content="Humanize rewrites pasted text to sound more natural and human.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="grain-overlay"></div>
  
  <nav>
    <div style="font-family: var(--font-serif); font-size: 1.2rem; font-weight: 900;">HUMANIZE_MANIFESTO</div>
    <button id="settings-toggle" class="btn" aria-controls="settings-overlay" aria-expanded="false" style="padding: 8px 16px; font-size: 0.8rem; border-color: transparent;">SETTINGS</button>
  </nav>

  <main class="manifesto-container">
    <div class="fade-in">
      <h1 class="hero-title">SAY_IT_<br>HUMAN</h1>
      
      <form id="humanize-form">
        <div class="text-area-wrapper">
          <div style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.2em; margin-bottom: 20px; opacity: 0.4;">Input_Buffer</div>
          <textarea id="input" name="input" class="v-input" placeholder="Paste your AI text here..." required></textarea>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px;">
          <button id="submit" class="btn-large" type="submit">
             <span class="btn-label">Execute_Transformation</span>
          </button>
          
          <div style="display: flex; gap: 10px; align-items: center; opacity: 0.8; font-family: var(--font-sans); font-size: 0.8rem;">
            <label for="tone" class="sr-only">Tone</label>
            <select id="tone" name="tone" class="minimal-select">
              <option value="natural" selected>Natural</option>
              <option value="casual">Casual</option>
              <option value="professional">Professional</option>
            </select>
            <label for="provider" class="sr-only">Provider</label>
            <select id="provider" name="provider" class="minimal-select">
              <option value="auto" selected>Auto</option>
              <option value="openai">OpenAI</option>
              <option value="anthropic">Anthropic</option>
              <option value="local">Local</option>
            </select>
          </div>
        </div>
        <p id="provider-hint" class="status"></p>
        <p id="status" class="status" aria-live="polite">READY</p>
        
        <!-- Hidden advanced controls -->
        <div style="display: none;">
           <input id="maxTokens" name="maxTokens" type="number">
           <input id="preserveMeaning" name="preserveMeaning" type="checkbox" checked>
        </div>
      </form>

      <div class="output-section">
        <div class="status-badge" id="output-badge" style="opacity: 0;">Manifesto_Complete</div>
        <div style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.2em; margin-bottom: 40px; opacity: 0.4;">Editorial_Output</div>
        
        <textarea id="output" class="v-output" readonly aria-label="Humanized text"></textarea>

        <div style="margin-top: 80px; display: flex; gap: 40px; flex-wrap: wrap;">
          <button id="copy" class="btn" style="border-color: var(--color-paper); color: var(--color-paper); padding: 18px 36px;" disabled>COPY_TO_CLIPBOARD</button>
          <span id="copy-state" class="status" style="align-self: center;" aria-live="polite"></span>
        </div>

        <!-- Meta info -->
        <div style="margin-top: 60px; font-family: var(--font-sans); font-size: 0.8rem; opacity: 0.6; display: flex; gap: 30px; flex-wrap: wrap; text-transform: uppercase;">
           <div>Provider: <strong id="providerOut">-</strong> (<strong id="providerAuth">-</strong>)</div>
           <div>Latency: <strong id="latency">-</strong></div>
           <div>I/O: <strong id="counts">- / -</strong></div>
           <div>Edits: <strong id="edits">-</strong></div>
        </div>
        <div style="margin-top: 30px;">
           <ul id="warnings" style="list-style: none; padding: 0; font-family: var(--font-sans); font-size: 0.8rem; color: var(--color-accent); line-height: 1.8;"></ul>
        </div>
      </div>
    </div>
  </main>

  <footer style="padding: 80px 40px; text-align: center;">
     <p style="font-family: var(--font-serif); font-size: 0.8rem; opacity: 0.4;">HUMANIZE / 2026 / MANIFESTO_EDITION</p>
  </footer>

  <!-- Settings Overlay -->
  <div id="settings-overlay" class="settings-overlay" hidden>
     <div class="settings-overlay__backdrop" data-close-settings aria-hidden="true"></div>
     <aside id="settings-panel" class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div style="display: flex; justify-content: space-between; margin-bottom: 60px; align-items: center;">
           <h2 id="settings-title" style="font-family: var(--font-serif); font-size: 2rem; margin: 0; font-weight: 300;">SETTINGS</h2>
           <button id="settings-close" data-close-settings class="btn" style="border: none;" aria-label="Close settings">CLOSE</button>
        </div>
        
        <div style="margin-bottom: 30px;">
           <label for="openaiKey" style="font-size: 0.8rem; text-transform: uppercase; font-weight: 900; letter-spacing: 0.1em;">OpenAI Key</label><br>
           <input id="openaiKey" name="openaiKey" type="password" class="minimal-input" style="margin-top: 10px;" autocomplete="off">
        </div>
        <div style="margin-bottom: 30px;">
           <label for="anthropicKey" style="font-size: 0.8rem; text-transform: uppercase; font-weight: 900; letter-spacing: 0.1em;">Anthropic Key</label><br>
           <input id="anthropicKey" name="anthropicKey" type="password" class="minimal-input" style="margin-top: 10px;" autocomplete="off">
        </div>
        <div style="margin-bottom: 40px; font-size: 0.9rem;">
           <label style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
             <input id="keys-ephemeral" name="keys-ephemeral" type="checkbox"> 
             <span>Ephemeral keys (this tab only)</span>
           </label>
        </div>
        <div style="display: flex; gap: 10px;">
           <button id="save-keys" class="btn btn-primary" type="button">SAVE_KEYS</button>
           <button id="clear-keys" class="btn btn-ghost" style="border: none; opacity: 0.5;" type="button">CLEAR</button>
        </div>
        <p id="key-status" class="status" aria-live="polite" style="margin-top: 20px;"></p>

        <!-- Hidden theme toggle since manifesto is inverse-only but required by JS -->
        <div style="display: none;">
           <button id="theme-toggle" aria-pressed="false"></button>
        </div>
     </aside>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
